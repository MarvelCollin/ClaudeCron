<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudeCron</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">ClaudeCron</p>
          <h1>Recurring <span>Claude</span> sessions.</h1>
        </div>
        <div class="hero-actions">
          <button id="openLogin" type="button" class="secondary">Open Claude Login</button>
          <button id="runNow" type="button" class="secondary">Run Now</button>
        </div>
      </section>

      <section class="panel">
        <h2>New Schedule</h2>
        <div class="config-row">
          <label for="triggerMessage">Trigger message</label>
          <input id="triggerMessage" type="text" placeholder="hi" value="hi">
        </div>
        <form id="scheduleForm">
          <div class="field">
            <label for="scheduleLabel">Label <span class="optional">(optional)</span></label>
            <input id="scheduleLabel" type="text" placeholder="e.g. Weekday mornings">
          </div>
          <div class="field">
            <div class="field-header">
              <label>Days</label>
              <div class="quick-select">
                <button type="button" data-quick="weekdays">Weekdays</button>
                <button type="button" data-quick="weekend">Weekend</button>
                <button type="button" data-quick="alldays">All</button>
              </div>
            </div>
            <div class="day-picker" id="dayPicker"></div>
          </div>
          <div class="field">
            <div class="field-header">
              <label>Hours</label>
              <div class="quick-select">
                <button type="button" data-quick="business">9-17</button>
                <button type="button" data-quick="allhours">All</button>
                <button type="button" data-quick="clearhours">Clear</button>
              </div>
            </div>
            <div class="hour-grid" id="hourGrid"></div>
          </div>
          <button type="submit">Create Schedule</button>
        </form>
        <p id="status" class="status">Ready.</p>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>Schedules</h2>
          <div id="schedules" class="list"></div>
        </div>
        <div class="panel">
          <div class="log-header">
            <h2>Run Log</h2>
            <span id="engineStatus" class="engine-badge">Idle</span>
          </div>
          <div id="logs" class="list"></div>
        </div>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
