<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudeCron</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="toolbar">
      <span class="logo">ClaudeCron</span>
      <div class="toolbar-right">
        <label class="cfg-label" for="modelSelect">Model</label>
        <select id="modelSelect" class="cfg-select">
          <option value="Haiku">Haiku 4.5</option>
          <option value="Sonnet">Sonnet 4</option>
          <option value="Opus">Opus 4</option>
        </select>
        <label class="cfg-label" for="triggerMessage">Message</label>
        <input id="triggerMessage" type="text" placeholder="hi" value="hi" class="cfg-input">
        <span id="browserName" class="browser-tag"></span>
        <button id="openClaude" type="button">Open Claude</button>
        <button id="runNow" type="button">Run Now</button>
      </div>
    </header>

    <main>
      <section class="card builder">
        <form id="scheduleForm">
          <div class="picker-group">
            <div class="picker-header">
              <h3>Days</h3>
              <div class="chips">
                <button type="button" data-quick="weekdays">Weekdays</button>
                <button type="button" data-quick="weekend">Weekend</button>
                <button type="button" data-quick="alldays">All</button>
              </div>
            </div>
            <div class="day-picker" id="dayPicker"></div>
          </div>

          <div class="picker-group">
            <div class="picker-header">
              <h3>Hours</h3>
              <div class="chips">
                <button type="button" data-quick="business">9-17</button>
                <button type="button" data-quick="allhours">All</button>
                <button type="button" data-quick="clearhours">Clear</button>
              </div>
            </div>
            <div class="hour-grid" id="hourGrid"></div>
          </div>

          <div class="picker-group">
            <div class="picker-header">
              <h3>Minutes</h3>
              <div class="chips">
                <button type="button" data-quick="on-hour">:00 only</button>
                <button type="button" data-quick="every15">Every 15m</button>
                <button type="button" data-quick="every30">Every 30m</button>
                <button type="button" data-quick="clearminutes">Clear</button>
              </div>
            </div>
            <div class="minute-grid" id="minuteGrid"></div>
          </div>

          <div id="preview" class="preview"></div>

          <div class="form-footer">
            <input id="scheduleLabel" type="text" placeholder="Label (optional)">
            <button type="submit">Create Schedule</button>
          </div>
        </form>
        <p id="status" class="status">Ready.</p>
      </section>

      <section class="card">
        <h3>Schedules</h3>
        <div id="schedules"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h3>Run Log</h3>
          <span id="engineStatus" class="badge">Idle</span>
        </div>
        <div id="logs"></div>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
